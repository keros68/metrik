name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# 同一分支的旧运行在新提交到来时取消，避免排队。
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            target: ""
          # macOS 目前只保证能编译：托盘、玻璃、窗口行为走的是另一套原生 API，
          # 没有实机验收之前不声称可用。
          - platform: macos-latest
            target: aarch64-apple-darwin

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      # 固定版本，与 README 声明的最低要求和开发机一致。滚动 stable 会让
      # 新版本引入的 lint 把 CI 变红，而本地无从复现。
      - uses: dtolnay/rust-toolchain@1.88.0
        with:
          components: clippy, rustfmt
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          key: ${{ matrix.platform }}

      - name: Install frontend dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Format check
        run: cargo fmt --check
        working-directory: src-tauri

      - name: Clippy
        run: cargo clippy -- -D warnings
        working-directory: src-tauri

      # 读取本机真实 Agent 日志的烟测标记为 ignored，CI 里跑不了也不该跑。
      - name: Test
        run: cargo test
        working-directory: src-tauri
