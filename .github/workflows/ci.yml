name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# 同一分支的旧运行在新提交到来时取消，避免排队。
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # 版本号是两台开发机共享的全局资源（见 AGENTS.md 的发版协议）。两边曾各自
  # 把 0.6.6 提成 0.6.7，先打上 tag 的那侧胜出，另一侧的发版提交只能作废。
  version-guard:
    runs-on: ubuntu-latest
    steps:
      # 需要全部 tag 才能判断版本号是否已被占用；PR 检出真实的 head 提交而不是
      # 合并提交，否则 base 上的 tag 永远算祖先，撞车就检测不出来。
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Version files agree and the version is not already taken
        shell: bash
        run: |
          set -euo pipefail

          pkg=$(jq -r .version package.json)
          lock_top=$(jq -r .version package-lock.json)
          lock_pkg=$(jq -r '.packages[""].version' package-lock.json)
          tauri=$(jq -r .version src-tauri/tauri.conf.json)
          cargo_toml=$(sed -n '/^\[package\]/,/^\[[^p]/p' src-tauri/Cargo.toml | sed -n 's/^version = "\(.*\)"$/\1/p' | head -1)
          cargo_lock=$(grep -A1 '^name = "metrik"$' src-tauri/Cargo.lock | sed -n 's/^version = "\(.*\)"$/\1/p' | head -1)

          status=0
          check() {
            if [ "$2" != "$pkg" ]; then
              echo "::error::$1 的版本是 '$2'，与 package.json 的 '$pkg' 不一致"
              status=1
            fi
          }
          check "package-lock.json (top)" "$lock_top"
          check "package-lock.json (packages[\"\"])" "$lock_pkg"
          check "src-tauri/tauri.conf.json" "$tauri"
          check "src-tauri/Cargo.toml" "$cargo_toml"
          check "src-tauri/Cargo.lock" "$cargo_lock"
          [ "$status" -eq 0 ] || exit 1
          echo "五个版本文件一致：$pkg"

          # vX 已存在却不在本次提交的历史里 = 另一台机器已经用掉了这个号。
          tag="v$pkg"
          if git rev-parse -q --verify "refs/tags/$tag^{commit}" >/dev/null; then
            if git merge-base --is-ancestor "$tag^{commit}" HEAD; then
              echo "$tag 已存在且在本次提交的历史内，正常。"
            else
              echo "::error::$tag 已被 $(git rev-parse --short "$tag^{commit}") 占用，且不在本次提交的历史内。另一台机器已经发过这个号：请 fetch + rebase 后改用下一个版本号，不要复用已 tag 的版本。"
              exit 1
            fi
          else
            echo "$tag 尚未被占用。"
          fi

  check:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            target: ""
          # macOS 目前只保证能编译：托盘、玻璃、窗口行为走的是另一套原生 API，
          # 没有实机验收之前不声称可用。
          - platform: macos-latest
            target: aarch64-apple-darwin

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      # 固定版本，与 README 声明的最低要求和开发机一致。滚动 stable 会让
      # 新版本引入的 lint 把 CI 变红，而本地无从复现。
      - uses: dtolnay/rust-toolchain@1.88.0
        with:
          components: clippy, rustfmt
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          key: ${{ matrix.platform }}

      - name: Install frontend dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Platform UI regression tests
        run: npm test

      - name: Format check
        run: cargo fmt --check
        working-directory: src-tauri

      - name: Clippy
        run: cargo clippy -- -D warnings
        working-directory: src-tauri

      # 读取本机真实 Agent 日志的烟测标记为 ignored，CI 里跑不了也不该跑。
      - name: Test
        run: cargo test
        working-directory: src-tauri
