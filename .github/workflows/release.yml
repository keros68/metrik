name: Release

# 推送 v* 标签时构建安装包并发布草稿 Release，由维护者确认后发布。
on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            args: ""
            rust-targets: ""
          # Intel + Apple Silicon 通用包。macOS 尚未实机验收，Release 说明里
          # 必须标明这一点。
          - platform: macos-latest
            args: "--target universal-apple-darwin"
            rust-targets: "aarch64-apple-darwin,x86_64-apple-darwin"

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      # 不开 npm 缓存：它的 post 步骤会在 macOS 上失败，把已经构建成功、产物也传完
      # 的 job 标红（0.3.0、0.4.0 各误报一次）。发布不频繁，不值得为这点缓存收益
      # 换一个会骗人的红叉。
      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: dtolnay/rust-toolchain@1.88.0
        with:
          targets: ${{ matrix.rust-targets }}

      # 发布不频繁，且通用构建的 target 布局会让缓存的路径校验在 post 步骤
      # 报错、把已成功的构建标红。发布流程不缓存，换取稳定的绿。

      - name: Install frontend dependencies
        run: npm ci

      # 安装包没有代码签名证书（Windows 会提示"未知发布者"，macOS 会提示
      # 无法验证开发者），这是已知且在 README 声明的边界。下面这对密钥是
      # Tauri 更新器自己的 minisign 签名，只保证更新包在分发链路上没被掉包。
      # 同时会生成 latest.json（更新器的检查端点）并一并上传到 Release。
      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: Metrik ${{ github.ref_name }}
          releaseDraft: true
          prerelease: false
          includeUpdaterJson: true
          args: ${{ matrix.args }}
